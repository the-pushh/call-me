steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/callme-backend/callme-api:$SHORT_SHA', './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/callme-backend/callme-api:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'callme-api'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/callme-backend/callme-api:$SHORT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8000'
      - '--memory=1Gi'
      - '--set-secrets=FROM_NUMBER=FROM_NUMBER:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,PUBLIC_BASE_URL=PUBLIC_BASE_URL:latest,TWILLIO_AUTH_TOKEN=TWILLIO_AUTH_TOKEN:latest,TWILLIO_SID=TWILLIO_SID:latest,CARTESIA_API_KEY=CARTESIA_API_KEY:latest'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/callme-backend/callme-api:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY